plugins {
    id "java"
    id "application"
}

group = "dev.httpserver"
version = "0.1.0"

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(21)
    }
}

application {
    mainClass = "dev.httpserver.nio.http.HttpServer"
}

tasks.withType(JavaCompile).configureEach {
    options.encoding = "UTF-8"
}

tasks.register("runBlockingEchoServer", JavaExec) {
    group = "application"
    description = "Run the blocking echo server"
    classpath = sourceSets.main.runtimeClasspath
    mainClass = "dev.httpserver.blocking.BlockingEchoServer"
}

tasks.register("runNioEchoServer", JavaExec) {
    group = "application"
    description = "Run the NIO echo server"
    classpath = sourceSets.main.runtimeClasspath
    mainClass = "dev.httpserver.nio.NioEchoServer"
}

tasks.register("runByteBufferExperiment", JavaExec) {
    group = "application"
    description = "Run the ByteBuffer experiment"
    classpath = sourceSets.main.runtimeClasspath
    mainClass = "dev.httpserver.nio.buffer.ByteBufferExperiment"
}

tasks.register("runMinimalHttpServer", JavaExec) {
    group = "application"
    description = "Run the minimal NIO HTTP server"
    classpath = sourceSets.main.runtimeClasspath
    mainClass = "dev.httpserver.nio.http.MinimalHttpServer"
}

tasks.register("runHttpRequestObservationServer", JavaExec) {
    group = "application"
    description = "Run the HTTP request observation server"
    classpath = sourceSets.main.runtimeClasspath
    mainClass = "dev.httpserver.nio.http.HttpRequestObservationServer"
}

tasks.register("runHttpServer", JavaExec) {
    group = "application"
    description = "Run the NIO HTTP server with request parser"
    classpath = sourceSets.main.runtimeClasspath
    mainClass = "dev.httpserver.nio.http.HttpServer"
}
